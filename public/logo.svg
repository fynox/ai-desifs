  <path d="M286 396 q10 -60 40 -78 q28 -18 70 -32 l-110 110 z" fill="#5c7420" opacity="0.65"/>
  <!-- AI -->
  <text x="238" y="272" font-family="Arial Black, Arial, sans-serif" font-size="118" font-weight="900" fill="#111210" text-anchor="middle">AI</text>
</svg>
