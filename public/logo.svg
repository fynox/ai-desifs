  <rect width="512" height="512" rx="96" fill="#111210"/>
  <!-- sticker -->
  <path d="M116 156 q0 -40 40 -40 h200 q40 0 40 40 v130 l-110 110 h-130 q-40 0 -40 -40 z" fill="#c8f04a"/>
  <!-- coin qui se décolle -->
